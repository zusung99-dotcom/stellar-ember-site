# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding (for people/profiles, use the author system in content/authors/)
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    # Site name - shown in navbar, footer, copyright, and browser title by default
    name: " "
    # Legal entity for copyright notices (defaults to name if not set)
    organization: ""
    # Schema.org type for structured data
    type: person                        # person | organization | local_business
    # Short tagline displayed on your site
    tagline: ""
    # Site meta description for search engines and social sharing
    description: "The highly-customizable Hugo Academic theme powered by HugoBlox Kit. Easily create your personal academic website."
    # Social accounts (used for meta tags like Twitter Cards)
    social:
      twitter: "MakeOwnable"              # Twitter/X handle for Twitter Cards (without @)

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    # Mode: 'light', 'dark', or 'system' (follows OS preference)
    mode: system
    # Theme pack: name from data/themes/ or { light: "x", dark: "y" } for mix-and-match
    pack: "default"
    # Optional: Override theme pack colors
    colors:
      primary: ""                       # Tailwind palette name or hex (e.g., "indigo" or "#6366f1")
      secondary: ""
      neutral: ""                       # Affects gray utilities (text-gray-*, bg-gray-*)
    # Optional: Mode-specific color overrides
    colors_light: {}
    colors_dark: {}
    # Optional: Semantic surface color overrides
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    # Theme pack: name from data/fonts/
    pack: "academic"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # Border radius: 'none', 'sm', 'md', 'lg', or 'full'
    radius: "md"
    # Spacing density: 'compact', 'comfortable', or 'spacious'
    spacing: "comfortable"
    # Avatar shape in author profiles
    avatar_shape: circle                # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    # Header style variant
    style: navbar                       # navbar | navbar-simple | minimal
    # Stick to top on scroll
    sticky: true
    # Menu alignment
    align: center                       # left | center | right
    # Feature toggles
    search: true
    theme_toggle: true
    theme_picker: true
    language_switcher: true
    # Call-to-action button
    cta:
      enable: false
      text: ""
      url: ""

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Site footer
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    # Footer style variant
    style: minimal                      # minimal | columns | centered
    language_switcher: true
    # Custom footer text (HTML supported)
    text: ""

  # ────────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # Legal notices and licensing
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    # Copyright notice - supports {year}, {name}, {license} placeholders
    notice: "© {year} {name}. This work is licensed under {license}"
    license:
      type: cc                          # cc | custom
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO
  # Search engine optimization - overrides and technical settings
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    # Browser tab title override (defaults to identity.name if not set)
    title: ""
    # For local_business identity type only
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    # AI/LLM crawler guidance (llms.txt)
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers - customize to match your public content."
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    # Math rendering
    math:
      enable: false
    # Table of contents
    toc:
      enable: true
    # Reading time estimates
    reading_time:
      enable: true
    # Academic citations
    citations:
      style: apa                        # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    # Trending/suggested search terms
    suggestions: []
    # Quick action shortcuts in search modal
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: ""                        # giscus | disqus
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""                # Google Analytics 4: G-XXXXXXXXXX
    google_tag_manager:
      container_id: ""                  # GTM-XXXXXXX
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: ""                             # e.g., https://github.com/username/repo
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"          # Go time format
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies (requires Netlify integration)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow                 # deny | sameorigin | allow - allow enables iframe embedding
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging (hidden in production)
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left             # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Premium features and creator program (affiliates)
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Hide "Powered by HugoBlox" attribution
    # Requires: HugoBlox Premium to support HugoBlox via alternative means
    # Note: Even with Premium, you can keep this false to support open source!
    # Get Premium: https://hugoblox.com/premium
    hide_attribution: false
    
    # Affiliate referral code for rewards program
    # Join affiliate program: https://hugoblox.com/affiliates
    affiliate_code: ""
# 사이트 디자인 설정
appearance:
  mode: light
  theme_day: hanyang
  theme_night: hanyang
  font: korean
  font_size: L
  - block: markdown
    id: research  # 메뉴의 /#research 와 연결되는 이름표
    content:
      title: "연구 분야 | RESEARCH INTEREST"
      subtitle: "미래 사회 안전을 위한 첨단 지진방재 및 내진공학 연구"
      text: |
        **한양대학교 지진방재 인력양성 사업단**은 건축 구조물의 안전성과 회복탄력성(Resilience)을 극대화하기 위해 내진공학 전반에 걸친 심도 있는 연구를 수행합니다. 재료 및 부재 단위부터 전체 구조 시스템에 이르기까지 다각적인 수준에서 거동을 분석하며, 탄탄한 이론을 바탕으로 고도화된 전산 해석과 실증적 실험(진동대 실험 등)을 병행하고 있습니다.
        
        우리의 주요 연구 관심사는 전통적인 내진공학을 넘어 미래 핵심 기술과 융합하는 데 있습니다.
        
        * **고도화된 내진설계 및 성능평가 (Advanced Seismic Design & Evaluation)**
        * **지반-구조물 상호작용 및 방재안전 (Soil-Structure Interaction & Disaster Safety)**
        * **기존 구조물의 첨단 내진보강 기법 (Seismic Retrofit for Existing Structures)**
        * **4차 산업혁명 융합 기술 (Smart Disaster Prevention):** AI, 데이터 기반 손상 식별 및 구조 건전성 모니터링
        
        사업단의 궁극적인 목표는 국가 지진방재 인프라를 고도화하여 국민의 안전하고 지속 가능한 삶에 기여하고, 나아가 세계적 수준의 연구 역량으로 학계와 산업계를 이끌어갈 미래의 리더를 양성하는 것입니다.
    design:
      spacing:
        padding: ["100px", "0", "100px", "0"] # 텍스트에 집중할 수 있도록 위아래 여백을 넉넉히 줍니다.
